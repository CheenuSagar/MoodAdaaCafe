<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Feedback – Mood Adaa Café</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="feedback.css">
</head>
<body class="feedback-bg" style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:60px 16px">

  <!-- Back Link -->
  <a href="index.html" class="back-link">← Back to Mood Adaa Café</a>

  <!-- Card -->
  <div style="background:#fff;border-radius:24px;box-shadow:0 24px 60px rgba(0,0,0,0.2);width:100%;max-width:440px;padding:36px">

    <!-- Header -->
    <div style="text-align:center;margin-bottom:28px">
      <p style="color:#bf7a44;font-size:11px;text-transform:uppercase;letter-spacing:0.2em;margin-bottom:6px">Share Your Experience</p>
      <h1 class="font-display" style="font-size:1.9rem;font-weight:700;color:#47301f">Your Feedback</h1>
      <p style="color:#aaa;font-size:13px;margin-top:6px">Help us brew better experiences ☕</p>
    </div>

    <!-- FORM -->
    <form id="feedbackForm" onsubmit="handleSubmit(event)">

      <!-- Name -->
      <div style="margin-bottom:18px">
        <label style="font-size:11px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:0.1em;display:block;margin-bottom:6px">Name</label>
        <input type="text" id="nameInput" placeholder="Your name" required class="fb-input">
      </div>

      <!-- Visit Type -->
      <div style="margin-bottom:18px">
        <label style="font-size:11px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:0.1em;display:block;margin-bottom:8px">Visit Type</label>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button type="button" class="visit-btn active" onclick="selectVisit(this)" style="padding:7px 16px;border-radius:999px;font-size:12px;font-weight:500">Dine In</button>
          <button type="button" class="visit-btn"        onclick="selectVisit(this)" style="padding:7px 16px;border-radius:999px;font-size:12px;font-weight:500">Take Away</button>
          <button type="button" class="visit-btn"        onclick="selectVisit(this)" style="padding:7px 16px;border-radius:999px;font-size:12px;font-weight:500">WhatsApp Order</button>
        </div>
      </div>

      <!-- Star Rating -->
      <div style="margin-bottom:18px">
        <label style="font-size:11px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:0.1em;display:block;margin-bottom:8px">Rating</label>
        <div id="starsContainer" style="display:flex;gap:4px;justify-content:center">
          <span class="star" style="font-size:36px" onclick="setRating(1)">★</span>
          <span class="star" style="font-size:36px" onclick="setRating(2)">★</span>
          <span class="star" style="font-size:36px" onclick="setRating(3)">★</span>
          <span class="star" style="font-size:36px" onclick="setRating(4)">★</span>
          <span class="star" style="font-size:36px" onclick="setRating(5)">★</span>
        </div>
        <p id="ratingLabel">Tap to rate</p>
      </div>

      <!-- Message -->
      <div style="margin-bottom:22px">
        <label style="font-size:11px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:0.1em;display:block;margin-bottom:6px">Message</label>
        <textarea id="msgInput" placeholder="Tell us about your experience..." rows="4" required class="fb-input" style="resize:none"></textarea>
      </div>

      <!-- Submit -->
      <button type="submit" class="submit-btn">Submit Feedback ✨</button>

    </form>

    <!-- Success State -->
    <div id="successMsg" style="display:none;text-align:center;padding:40px 0">
      <div style="font-size:56px;margin-bottom:16px">🎉</div>
      <h2 class="font-display" style="font-size:1.6rem;font-weight:700;color:#47301f;margin-bottom:8px">Thank You!</h2>
      <p style="color:#888;font-size:14px;line-height:1.6">Your feedback means the world to us.<br>We'll keep brewing happiness for you!</p>
      <a href="index.html" style="display:inline-block;margin-top:24px;background:#6f4e37;color:#fff;padding:12px 28px;border-radius:12px;font-size:14px;font-weight:500;text-decoration:none">
        Back to Café ☕
      </a>
    </div>

  </div>

  <script src="feedback.js"></script>
</body>
</html>
