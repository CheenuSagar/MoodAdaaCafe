<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Feedback – Mood Adaa Café</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="feedback.css">
</head>
<body class="min-h-screen feedback-bg flex flex-col items-center justify-center px-4 py-20">

  <!-- Back Link -->
  <a href="index.html" class="text-brew-200 text-sm mb-8 hover:text-white transition-colors flex items-center gap-2">
    ← Back to Mood Adaa Café
  </a>

  <!-- Feedback Card -->
  <div class="bg-white rounded-3xl shadow-2xl w-full max-w-md p-8">

    <!-- Header -->
    <div class="text-center mb-8">
      <p class="text-brew-400 text-xs uppercase tracking-widest mb-2">Share Your Experience</p>
      <h1 class="font-display text-3xl font-bold text-brew-700">Your Feedback</h1>
      <p class="text-gray-400 text-sm mt-2">Help us brew better experiences ☕</p>
    </div>

    <!-- Form -->
    <form id="feedbackForm" onsubmit="handleSubmit(event)" class="space-y-5">

      <!-- Name -->
      <div>
        <label class="text-xs font-medium text-gray-500 uppercase tracking-wider block mb-1">Name</label>
        <input
          type="text"
          id="nameInput"
          placeholder="Your name"
          required
          class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-brew-400 transition-colors"
        >
      </div>

      <!-- Visit Type -->
      <div>
        <label class="text-xs font-medium text-gray-500 uppercase tracking-wider block mb-2">Visit Type</label>
        <div class="flex gap-2 flex-wrap">
          <button type="button" class="visit-btn active px-4 py-2 rounded-full border border-brew-300 text-xs font-medium transition-all" onclick="selectVisit(this)">Dine In</button>
          <button type="button" class="visit-btn px-4 py-2 rounded-full border border-gray-200 text-xs font-medium transition-all" onclick="selectVisit(this)">Take Away</button>
          <button type="button" class="visit-btn px-4 py-2 rounded-full border border-gray-200 text-xs font-medium transition-all" onclick="selectVisit(this)">WhatsApp Order</button>
        </div>
      </div>

      <!-- Star Rating -->
      <div>
        <label class="text-xs font-medium text-gray-500 uppercase tracking-wider block mb-2">Rating</label>
        <div class="flex gap-1 justify-center" id="starsContainer">
          <span class="star text-4xl cursor-pointer select-none" data-val="1" onclick="setRating(1)">★</span>
          <span class="star text-4xl cursor-pointer select-none" data-val="2" onclick="setRating(2)">★</span>
          <span class="star text-4xl cursor-pointer select-none" data-val="3" onclick="setRating(3)">★</span>
          <span class="star text-4xl cursor-pointer select-none" data-val="4" onclick="setRating(4)">★</span>
          <span class="star text-4xl cursor-pointer select-none" data-val="5" onclick="setRating(5)">★</span>
        </div>
        <p id="ratingLabel" class="text-center text-xs text-gray-400 mt-1">Tap to rate</p>
      </div>

      <!-- Message -->
      <div>
        <label class="text-xs font-medium text-gray-500 uppercase tracking-wider block mb-1">Message</label>
        <textarea
          id="msgInput"
          placeholder="Tell us about your experience..."
          rows="4"
          required
          class="w-full border border-gray-200 rounded-xl px-4 py-3 text-sm focus:outline-none focus:border-brew-400 transition-colors resize-none"
        ></textarea>
      </div>

      <!-- Submit -->
      <button
        type="submit"
        class="w-full bg-brew-500 hover:bg-brew-600 text-white py-3.5 rounded-xl font-medium transition-all hover:scale-[1.01] active:scale-[0.99]"
      >
        Submit Feedback ✨
      </button>
    </form>

    <!-- Success State (hidden by default) -->
    <div id="successMsg" class="hidden text-center py-8">
      <div class="text-6xl mb-4">🎉</div>
      <h2 class="font-display text-2xl font-bold text-brew-700 mb-2">Thank You!</h2>
      <p class="text-gray-500 text-sm">Your feedback means the world to us.<br>We'll keep brewing happiness for you!</p>
      <a href="index.html" class="inline-block mt-6 bg-brew-500 text-white px-6 py-3 rounded-xl text-sm font-medium hover:bg-brew-600 transition-colors">
        Back to Café ☕
      </a>
    </div>

  </div>

  <script src="feedback.js"></script>
</body>
</html>
